{% extends "admin/base_admin.html" %}
{% block title %}Server logs - Nofal Panel{% endblock %}
{% block content %}
<div class="page-header d-flex justify-content-between align-items-center flex-wrap gap-2">
  <div>
    <h2><i class="fas fa-file-alt me-2"></i>Server logs</h2>
    <span class="text-muted">Tail log files (WHM » Service status » tail logs)</span>
  </div>
  <form class="d-flex align-items-center gap-2" method="get" action="/admin/server/logs">
    <label class="small text-muted mb-0">Log</label>
    <select class="form-select form-select-sm" name="service" style="width:auto" onchange="this.form.submit()">
      {% for s in services_list %}
      <option value="{{ s }}" {% if s == current_service %}selected{% endif %}>{{ s }}</option>
      {% endfor %}
    </select>
  </form>
</div>

<div class="card panel-card">
  <div class="card-body p-0">
    <pre class="mb-0 p-3 small text-wrap" style="max-height:480px;overflow:auto;background:#1a1a2e;color:#c8e6c9;font-family:ui-monospace,monospace;">{% for line in logs %}{{ line }}
{% endfor %}</pre>
  </div>
</div>
{% endblock %}
