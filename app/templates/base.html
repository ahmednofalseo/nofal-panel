<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Nofal Panel{% endblock %}</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
    {% block extra_head %}{% endblock %}
    {% block extra_css %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
{% block body %}{% endblock %}
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/main.js"></script>
<script>
// CSRF: inject token into all POST forms (server-side verified).
(function () {
  function getCookie(name) {
    const m = document.cookie.match(new RegExp('(?:^|; )' + name.replace(/([.$?*|{}()\\[\\]\\\\\\/\\+^])/g, '\\\\$1') + '=([^;]*)'));
    return m ? decodeURIComponent(m[1]) : null;
  }
  const csrfName = "{{ CSRF_COOKIE_NAME | default('csrf_token') }}";
  const token = getCookie(csrfName);
  if (!token) return;
  document.querySelectorAll("form").forEach((f) => {
    const method = (f.getAttribute("method") || "get").toLowerCase();
    if (method !== "post") return;
    if (f.querySelector("input[name='csrf_token']")) return;
    const i = document.createElement("input");
    i.type = "hidden";
    i.name = "csrf_token";
    i.value = token;
    f.appendChild(i);
  });
})();
</script>
{% block extra_js %}{% endblock %}
</body>
</html>
