{% extends "cpanel/base_cpanel.html" %}
{% block title %}SSH — Nofal Panel{% endblock %}
{% block content %}
<div class="page-header"><h2><i class="fas fa-terminal me-2"></i>SSH</h2></div>
{% if request.query_params.get('saved') %}<div class="alert alert-success">تم الحفظ.</div>{% endif %}
<div class="card jupiter-card">
  <div class="card-body">
    <p class="small text-muted">مفتاح SSH العام لتثبيته على الخادم (يدوياً أو عبر أتمتة لاحقة).</p>
    <form method="post" action="/cpanel/ssh/save">
      <div class="mb-2">
        <label class="form-label">المفتاح العام</label>
        <textarea name="pubkey" class="form-control form-control-sm font-monospace" rows="4">{{ cfg.pubkey or '' }}</textarea>
      </div>
      <div class="mb-2">
        <label class="form-label">ملاحظات</label>
        <textarea name="notes" class="form-control form-control-sm" rows="2">{{ cfg.notes or '' }}</textarea>
      </div>
      <button type="submit" class="btn btn-primary btn-sm">حفظ</button>
    </form>
  </div>
</div>
{% endblock %}
