{% extends "cpanel/base_cpanel.html" %}
{% block title %}File Editor — Nofal Panel{% endblock %}
{% block content %}
<div class="page-header mb-3">
  <h2 class="h3 jupiter-page-title"><i class="fas fa-file-code me-2 text-primary"></i>File Editor</h2>
  <p class="text-muted small mb-0"><code>{{ file_path }}</code></p>
</div>

<div class="card jupiter-card">
  <div class="card-header jupiter-card-header d-flex justify-content-between align-items-center">
    <span><i class="fas fa-pen me-2"></i>{{ filename }}</span>
    <a class="btn btn-sm btn-outline-secondary" href="/cpanel/files?path={{ file_path.rsplit('/', 1)[0] if '/' in file_path else '' }}"><i class="fas fa-arrow-left me-1"></i>Back</a>
  </div>
  <div class="card-body">
    <form method="post" action="/cpanel/files/edit">
      <input type="hidden" name="path" value="{{ file_path }}">
      <textarea name="content" class="form-control font-monospace small" rows="22" spellcheck="false">{{ content }}</textarea>
      <div class="d-flex gap-2 mt-2">
        <button class="btn btn-primary btn-sm" type="submit">Save</button>
        <a class="btn btn-outline-secondary btn-sm" href="/cpanel/files/download?path={{ file_path }}">Download</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
