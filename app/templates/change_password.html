{% extends "base.html" %}
{% block title %}Change Password - Nofal Panel{% endblock %}
{% block body_class %}login-page{% endblock %}
{% block body %}
<div class="login-container">
  <div class="login-box">
    <div class="login-logo">
      <i class="fas fa-key"></i>
      <h1>Change <span>Password</span></h1>
    </div>
    {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
    {% if success %}<div class="alert alert-success">{{ success }}</div>{% endif %}
    <form method="POST" action="/auth/change-password">
      <div class="mb-3">
        <label class="form-label text-white-50">Current Password</label>
        <input type="password" name="current_password" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label text-white-50">New Password</label>
        <input type="password" name="new_password" class="form-control" required minlength="8">
      </div>
      <div class="mb-4">
        <label class="form-label text-white-50">Confirm New Password</label>
        <input type="password" name="confirm_password" class="form-control" required>
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary btn-lg flex-grow-1">Change Password</button>
        <a href="javascript:history.back()" class="btn btn-secondary btn-lg">Back</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
