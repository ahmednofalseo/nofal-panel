services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: nofal_panel
      POSTGRES_USER: nofal
      POSTGRES_PASSWORD: nofal_password_change
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  web:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg2://nofal:nofal_password_change@db:5432/nofal_panel
      APP_MODE: full
    ports:
      - "2083:2083"
    depends_on:
      - db
      - redis

  worker:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg2://nofal:nofal_password_change@db:5432/nofal_panel
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    command: ["bash", "-lc", "python -c 'print(\"celery wiring pending\")' && sleep 3600"]
    depends_on:
      - redis
      - db

volumes:
  pg_data:

