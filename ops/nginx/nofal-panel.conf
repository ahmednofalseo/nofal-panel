##
# Nofal Panel — Nginx (production-oriented)
#
# TLS paths: many VPS installs use /etc/nginx/ssl/ (see install scripts).
# Alternative: /etc/ssl/certs/nofal-panel.crt + /etc/ssl/private/nofal-panel.key
#
# - 443 proxies to admin uvicorn (no redirect to :2020). Set ADMIN_PUBLIC_PORT=443 in .env.
# - 2020 / 3030 optional alternate entrypoints.
##

# HTTP → HTTPS (no default_server on :80 — avoids clash with another vhost)
server {
  listen 80;
  listen [::]:80;
  server_name _;
  return 301 https://$host$request_uri;
}

# HTTPS default for bare IP / unmatched SNI → admin backend
server {
  listen 443 ssl http2 default_server;
  listen [::]:443 ssl http2 default_server;
  server_name _;

  ssl_certificate     /etc/nginx/ssl/nofal-panel-selfsigned.crt;
  ssl_certificate_key /etc/nginx/ssl/nofal-panel-selfsigned.key;

  client_max_body_size 100M;

  location / {
    proxy_pass http://127.0.0.1:12020;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port 443;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 300s;
  }

  location /healthz {
    proxy_pass http://127.0.0.1:12020/healthz;
  }
}

