##
# Nofal Panel Nginx (example)
# - TLS termination
# - Reverse proxy to internal admin/user uvicorn
##

server {
  listen 2020 ssl http2;
  server_name _;

  ssl_certificate     /etc/ssl/certs/nofal-panel.crt;
  ssl_certificate_key /etc/ssl/private/nofal-panel.key;

  client_max_body_size 128m;

  location / {
    proxy_pass http://127.0.0.1:12020;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }

  location /healthz {
    proxy_pass http://127.0.0.1:12020/healthz;
  }
}

