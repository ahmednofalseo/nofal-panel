##
# Nofal Panel — Nginx (production-oriented)
#
# - Prefer TLS on 443 with direct proxy_pass to uvicorn (no redirect to :2020).
#   On the server, set in .env: ADMIN_PUBLIC_PORT=443 (and open 80/443 in firewall).
# - Ports 2020/3030 remain optional alternate entrypoints (same backends).
# - Split admin/user: two processes (12020 / 13030). With IP-only + one 443 listener,
#   this file maps 443 → admin. Expose user panel via 3030 or add another server_name
#   block on 443 pointing to 13030.
##

# HTTP → HTTPS (no :port in redirect — avoids clients hanging on blocked 2020)
server {
  listen 80 default_server;
  listen [::]:80 default_server;
  server_name _;
  return 301 https://$host$request_uri;
}

# Primary public HTTPS — admin backend (matches systemd nofal-panel-admin → 12020)
server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name _;

  ssl_certificate     /etc/ssl/certs/nofal-panel.crt;
  ssl_certificate_key /etc/ssl/private/nofal-panel.key;

  client_max_body_size 128m;

  location / {
    proxy_pass http://127.0.0.1:12020;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }

  location /healthz {
    proxy_pass http://127.0.0.1:12020/healthz;
  }
}

server {
  listen 2020 ssl http2;
  server_name _;

  ssl_certificate     /etc/ssl/certs/nofal-panel.crt;
  ssl_certificate_key /etc/ssl/private/nofal-panel.key;

  client_max_body_size 128m;

  location / {
    proxy_pass http://127.0.0.1:12020;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }

  location /healthz {
    proxy_pass http://127.0.0.1:12020/healthz;
  }
}

server {
  listen 3030 ssl http2;
  server_name _;

  ssl_certificate     /etc/ssl/certs/nofal-panel.crt;
  ssl_certificate_key /etc/ssl/private/nofal-panel.key;

  client_max_body_size 128m;

  location / {
    proxy_pass http://127.0.0.1:13030;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }

  location /healthz {
    proxy_pass http://127.0.0.1:13030/healthz;
  }
}
