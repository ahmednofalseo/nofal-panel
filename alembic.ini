[alembic]
script_location = migrations
prepend_sys_path = .

# Override via env var DATABASE_URL at runtime:
#   DATABASE_URL=postgresql+psycopg2://user:pass@host:5432/db alembic upgrade head
sqlalchemy.url = sqlite:///./nofal_panel.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine
propagate = 0

[logger_alembic]
level = INFO
handlers =
qualname = alembic
propagate = 0

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
